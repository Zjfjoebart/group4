name: Publish Training Image to GHCR

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ghcr_train_image.yml"
      - "docker/Dockerfile.internal"
      - "pyproject.toml"
      - "uv.lock"
      - "setup.py"
      - "MANIFEST.in"
      - "src/**"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/zjfjoebart/group4

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and Push GPU Training Image
    runs-on: ubuntu-latest
    if: github.repository == 'Zjfjoebart/group4'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: false
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push training image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.internal
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:train-gpu
            ${{ env.IMAGE_NAME }}:train-gpu-${{ github.sha }}
